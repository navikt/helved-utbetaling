junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.mode.default=same_thread
# Test classes within a fork run concurrently. This is safe because all
# classes share the singleton TestRuntime (one Jdbc, one StreamsMock, one
# Ktor server) and tests already coordinate via the `await { }` pattern.
# Methods inside a class still run serially.
junit.jupiter.execution.parallel.mode.classes.default=concurrent
