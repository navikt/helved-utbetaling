name: dependency-graph

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # submit dependency-graph
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit
      # `help -q` is a cheap no-op task that still triggers Gradle's
      # configuration phase, which is what setup-gradle needs to capture
      # and submit the dependency graph.
      - run: ./gradlew help -q
