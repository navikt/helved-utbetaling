name: speiderhytta

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'apps/speiderhytta/**'
      - 'apps/*/slo.yml'
      - '.github/workflows/speiderhytta.yml'
      - 'build.gradle.kts'
      - 'Dockerfile'

jobs:
  test:
    if: github.event.pull_request.merged || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - run: ./gradlew apps:${{ github.workflow }}:test --continue --parallel

      - uses: dorny/test-reporter@v3.0.0
        if: success() || failure()
        with:
          name: tests
          path: "**/**/build/test-results/test/TEST-*.xml"
          reporter: java-junit
          token: ${{ secrets.GITHUB_TOKEN }}

  package:
    if: github.event.pull_request.merged || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - run: ./gradlew apps:${{ github.workflow }}:buildFatJar --parallel

      # Skip SLSA attestation (cosign + SBOM) when deps.jar is byte-identical
      # to a previously-attested build. Saves ~25s/build on commits that don't
      # bump dependencies (~91% of commits). Trade-off: those images don't get
      # re-scanned by Dependency-Track, but they share the same dep-set as the
      # previous (attested) image.
      - id: deps_hash
        run: echo "sha=$(sha256sum apps/${{ github.workflow }}/build/split-jars/deps.jar | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - id: deps_cache
        uses: actions/cache/restore@v5
        with:
          path: .deps-attested-marker
          key: deps-attested-${{ github.workflow }}-${{ steps.deps_hash.outputs.sha }}

      - id: salsa
        run: |
          if [ "${{ steps.deps_cache.outputs.cache-hit }}" = "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::deps.jar unchanged since last attested build (${{ steps.deps_hash.outputs.sha }}); skipping SLSA attestation"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: nais/docker-build-push@v0
        with:
          team: helved
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          image_suffix: ${{ github.workflow }}
          tag: ${{ github.sha }}
          dockerfile: Dockerfile
          salsa: ${{ steps.salsa.outputs.enabled }}
          # Skip buildx cache export. With our split-jar Dockerfile every COPY
          # either always changes (app.jar) or is content-addressed and pulled
          # cheaply from the registry on next build (deps.jar). Caching buildkit
          # state to GHA adds ~2s per push for negligible benefit.
          cache_to: ""

      # Persist marker only on success of the attested build, so a failed
      # build doesn't poison the cache.
      - if: success() && steps.deps_cache.outputs.cache-hit != 'true' && steps.salsa.outputs.enabled == 'true'
        run: echo "${{ steps.deps_hash.outputs.sha }}" > .deps-attested-marker

      - if: success() && steps.deps_cache.outputs.cache-hit != 'true' && steps.salsa.outputs.enabled == 'true'
        uses: actions/cache/save@v5
        with:
          path: .deps-attested-marker
          key: deps-attested-${{ github.workflow }}-${{ steps.deps_hash.outputs.sha }}

  deploy-prod:
    if: github.event.pull_request.merged || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, package]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Build SLO definitions ConfigMap
        run: |
          mkdir -p generated
          args=()
          for f in apps/*/slo.yml; do
            [ -f "$f" ] || continue
            app=$(basename "$(dirname "$f")")
            args+=(--from-file="${app}.yml=${f}")
          done
          if [ ${#args[@]} -eq 0 ]; then
            # ensure the configmap exists even if no SLOs are defined yet,
            # so the filesFrom mount in prod.yml stays valid.
            kubectl create configmap helved-slo-definitions \
              --namespace helved \
              --dry-run=client -o yaml \
              > apps/${{ github.workflow }}/slo-configmap.yml
          else
            kubectl create configmap helved-slo-definitions \
              --namespace helved \
              "${args[@]}" \
              --dry-run=client -o yaml \
              > apps/${{ github.workflow }}/slo-configmap.yml
          fi
          # add the standard team label so the ConfigMap matches our other resources
          sed -i '/^metadata:/a\  labels:\n    team: helved' apps/${{ github.workflow }}/slo-configmap.yml
          cat apps/${{ github.workflow }}/slo-configmap.yml

      - uses: nais/login@v0
        id: login
        with:
          team: helved
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
      - uses: nais/deploy/actions/deploy@v2
        env:
          PRINT_PAYLOAD: true
          CLUSTER: prod-gcp
          RESOURCE: apps/${{ github.workflow }}/slo-configmap.yml,apps/${{ github.workflow }}/prod.yml,apps/${{ github.workflow }}/alert.yml
          VAR: image=${{ steps.login.outputs.registry }}/${{ github.event.repository.name }}-${{ github.workflow }}:${{ github.sha }}
