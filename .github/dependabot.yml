version: 2

registries:
  maven-github:
    type: maven-repository
    url: https://github-package-registry-mirror.gc.nav.no/cached/maven-release
    username: POSTMAN
    password: PAT

updates:

- package-ecosystem: github-actions
  directory: /
  schedule:
     interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 1 # avoid merge-conflicts on auto-merge
  commit-message:
    prefix: "#511"
    prefix-development: "#511"

- package-ecosystem: gradle
  directory: /
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 1 # avoid merge-conflicts on auto-merge
  registries:
    - maven-github
  commit-message:
    prefix: "#511"
    prefix-development: "#511"
