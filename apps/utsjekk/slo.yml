version: prometheus/v1
service: utsjekk
labels:
  team: helved
  app: utsjekk
slos:
  - name: iverksetting-availability
    objective: 99.9
    description: |
      Iverksetting endpoint should complete successfully for at least 99.9%
      of requests over a 30-day window.
    sli:
      events:
        error_query: |
          sum(rate(helved_utsjekk_iverksetting_total{
            k8s_cluster_name="prod",
            result="error"
          }[5m]))
        total_query: |
          sum(rate(helved_utsjekk_iverksetting_total{
            k8s_cluster_name="prod"
          }[5m]))
  - name: dryrun-availability
    objective: 99.5
    description: |
      Dryrun endpoints should complete successfully for at least 99.5% of
      requests over a 30-day window.
    sli:
      events:
        error_query: |
          sum(rate(helved_utsjekk_dryrun_request_total{
            k8s_cluster_name="prod",
            result=~"error|timeout"
          }[5m]))
        total_query: |
          sum(rate(helved_utsjekk_dryrun_request_total{
            k8s_cluster_name="prod"
          }[5m]))
