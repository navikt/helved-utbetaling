apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: abetal
  namespace: helved
  labels:
    team: helved
spec:
  image: {{ image }}
  terminationGracePeriodSeconds: 70
  liveness:
    path: /actuator/live
    failureThreshold: 60
    initialDelay: 360
    periodSeconds: 1
  readiness:
    path: /actuator/ready
    failureThreshold: 2160
    initialDelay: 10
    periodSeconds: 5
  prometheus:
    path: /actuator/metric
    enabled: true
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      memory: 2000Mi
    requests:
      memory: 1200Mi
      cpu: 3000m
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: loki
        - id: elastic
  env:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://opentelemetry-collector.nais-system:4317
    - name: OTEL_EXPORTER_OTLP_INSECURE
      value: "true"
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: utsjekk
  kafka:
    pool: nav-prod
    streams: true
