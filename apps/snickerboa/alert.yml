apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snickerboa-alerts
  namespace: helved
  labels:
    team: helved
spec:
  groups:
    - name: app
      rules:
        - alert: unavailable
          expr: sum(kube_deployment_status_replicas_available{app="snickerboa", namespace="helved"} offset 5m) by (deployment, namespace) == 0
          for: 5m
          annotations:
            consequence: 'snickerboa er dau'
            action: '`kubectl describe pod -l app=snickerboa` -> `kubectl logs -l app=snickerboa`'
          labels:
            namespace: helved
            severity: critical
