apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snickerboa-alerts
  namespace: helved
  labels:
    team: helved
spec:
  groups:
    - name: app
      rules:
        - alert: unavailable
          expr: sum(kube_deployment_status_replicas_available{app="snickerboa", namespace="helved"} offset 5m) by (deployment, namespace) == 0
          for: 5m
          annotations:
            consequence: 'snickerboa er dau'
            action: '`kubectl describe pod -l app=snickerboa` -> `kubectl logs -l app=snickerboa`'
          labels:
            namespace: helved
            severity: critical

    - name: vulnerabilities
      rules:
        - alert: CriticalVulnerability
          expr: sum by (workload_name, workload_namespace) (nais_workload_vulnerabilities{severity="CRITICAL", workload_namespace="helved", workload_type!="platform", workload_cluster="dev"}) > 0
          for: 10m
          annotations:
            summary: "Kritisk sårbarhet (CVSS >= 9.0) i {{ $labels.workload_name }}"
            action: "NAIS Console: https://console.nav.cloud.nais.io/team/helved/dev-gcp/app/{{ $labels.workload_name }}/vulnerabilities"
          labels:
            namespace: helved
            severity: critical
            alert_type: custom
            slack_layout: helved-vulnerability

        - alert: HighVulnerability
          expr: sum by (workload_name, workload_namespace) (nais_workload_vulnerabilities{severity="HIGH", workload_namespace="helved", workload_type!="platform", workload_cluster="dev"}) > 0
          for: 10m
          annotations:
            summary: "Høy sårbarhet (CVSS 7.0-8.9) i {{ $labels.workload_name }}"
            action: "NAIS Console: https://console.nav.cloud.nais.io/team/helved/dev-gcp/app/{{ $labels.workload_name }}/vulnerabilities"
          labels:
            namespace: helved
            severity: high
            alert_type: custom
            slack_layout: helved-vulnerability