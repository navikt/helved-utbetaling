apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: snickerboa
  namespace: helved
  labels:
    team: helved
spec:
  terminationGracePeriodSeconds: 70
  image: {{ image }}
  ingresses:
    - https://snickerboa.intern.dev.nav.no
  resources:
    limits:
      memory: 1024Mi
    requests:
      memory: 512Mi
      cpu: 200m
  liveness:
    path: /actuator/live
    initialDelay: 5
    periodSeconds: 2
  readiness:
    path: /actuator/ready
    initialDelay: 5
    periodSeconds: 2
  prometheus:
    path: /actuator/metric
    enabled: true
  replicas:
    min: 1
    max: 1
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: loki
  kafka:
    pool: nav-dev
    streams: true
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: utsjekk
