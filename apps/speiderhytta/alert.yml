apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: speiderhytta-alerts
  namespace: helved
  labels:
    team: helved
spec:
  groups:
    - name: app
      rules:
        - alert: unavailable
          expr: sum(kube_deployment_status_replicas_available{app="speiderhytta", namespace="helved"} offset 5m) by (deployment, namespace) == 0
          for: 5m
          annotations:
            consequence: 'speiderhytta er dau - ingen DORA/SLO-data oppdateres'
            action: '`kubectl describe pod -l app=speiderhytta` -> `kubectl logs -l app=speiderhytta`'
          labels:
            namespace: helved
            severity: warning

    - name: poller
      rules:
        - alert: deploy_poller_stale
          expr: time() - speiderhytta_last_successful_poll_seconds{poller="deploy"} > 1800
          for: 10m
          annotations:
            summary: 'Deploy-poller har ikke lykkes på 30 min'
            action: 'Sjekk speiderhytta-logger og NAIS Deploy API tilgjengelighet'
          labels:
            namespace: helved
            severity: warning

        - alert: incident_poller_stale
          expr: time() - speiderhytta_last_successful_poll_seconds{poller="incident"} > 1800
          for: 10m
          annotations:
            summary: 'Incident-poller har ikke lykkes på 30 min'
            action: 'Sjekk GitHub App-credentials og api.github.com-tilgjengelighet'
          labels:
            namespace: helved
            severity: warning

    - name: vulnerabilities
      rules:
        - alert: CriticalVulnerability
          expr: sum by (workload_name, workload_namespace) (nais_workload_vulnerabilities{severity="CRITICAL", workload_namespace="helved", workload_type!="platform", workload_cluster="prod"}) > 0
          for: 10m
          annotations:
            summary: "Kritisk sårbarhet (CVSS >= 9.0) i {{ $labels.workload_name }}"
            action: "NAIS Console: https://console.nav.cloud.nais.io/team/helved/prod-gcp/app/{{ $labels.workload_name }}/vulnerabilities"
          labels:
            namespace: helved
            severity: critical
            alert_type: custom
            slack_layout: helved-vulnerability

        - alert: HighVulnerability
          expr: sum by (workload_name, workload_namespace) (nais_workload_vulnerabilities{severity="HIGH", workload_namespace="helved", workload_type!="platform", workload_cluster="prod"}) > 0
          for: 10m
          annotations:
            summary: "Høy sårbarhet (CVSS 7.0-8.9) i {{ $labels.workload_name }}"
            action: "NAIS Console: https://console.nav.cloud.nais.io/team/helved/prod-gcp/app/{{ $labels.workload_name }}/vulnerabilities"
          labels:
            namespace: helved
            severity: high
            alert_type: custom
            slack_layout: helved-vulnerability